apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-shortener-vm
  labels:
    app: url-shortener-vm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: url-shortener-vm
  template:
    metadata:
      labels:
        app: url-shortener-vm
    spec:
      containers:
        - name: url-shortener-vm
          image: nginx:stable
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
